<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Distribution Coeur-Soleil — le concierge IA de vos clients. Portails et concierges intelligents pour l'hôtellerie. Depuis 1993, au Québec.">
<meta property="og:title" content="Distribution Coeur-Soleil">
<meta property="og:description" content="Le concierge de vos clients, propulsé par l'intelligence artificielle.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%A7%A1</text></svg>">
<title>Distribution Coeur-Soleil — Le concierge IA de vos clients</title>
<style>
  :root{
    --paper:#FBF8F2; --card:#ffffff; --ink:#16202B; --ink-soft:#3b4654;
    --muted:#6d6456; --hair:#ece5d7; --hair-2:#e2d9c8;
    --gold:#E9A63A; --gold-deep:#CE8A20; --gold-soft:#F6E7C6; --midnight:#0B1420; --mid-2:#111d2c;
    --radius:18px; --maxw:1120px;
    --head:"Avenir Next","Avenir","Century Gothic","Futura",ui-rounded,"Segoe UI",system-ui,sans-serif;
    --body:"Inter","Helvetica Neue",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --paper:#0a0f16; --card:#111a26; --ink:#eef2f8; --ink-soft:#c3ccd8; --muted:#94a0b0;
    --hair:#1d2836; --hair-2:#25303f; --gold:#F2BE55; --gold-deep:#E9A63A; --gold-soft:#2a2415;
  }}
  :root[data-theme="light"]{--paper:#FBF8F2;--card:#fff;--ink:#16202B;--ink-soft:#3b4654;--muted:#6d6456;--hair:#ece5d7;--hair-2:#e2d9c8;--gold:#E9A63A;--gold-deep:#CE8A20;--gold-soft:#F6E7C6;}
  :root[data-theme="dark"]{--paper:#0a0f16;--card:#111a26;--ink:#eef2f8;--ink-soft:#c3ccd8;--muted:#94a0b0;--hair:#1d2836;--hair-2:#25303f;--gold:#F2BE55;--gold-deep:#E9A63A;--gold-soft:#2a2415;}

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.6}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(18px,4vw,34px)}
  a{color:inherit;text-decoration:none}
  h1,h2,h3{font-family:var(--head);letter-spacing:-.02em;text-wrap:balance;margin:0}
  .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--gold-deep)}
  :root[data-theme="dark"] .eyebrow{color:var(--gold)}
  @media (prefers-color-scheme:dark){.eyebrow{color:var(--gold)}}

  header{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--paper) 86%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair)}
  .nav{display:flex;align-items:center;gap:24px;height:68px}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer}
  .brand .wm{display:flex;flex-direction:column;line-height:1;gap:3px}
  .brand .wm .t{font-family:var(--head);font-size:8.5px;letter-spacing:.28em;color:var(--muted);font-weight:600}
  .brand .wm .m{font-family:var(--head);font-size:17px;font-weight:600;color:var(--ink)}
  .nav .links{display:flex;gap:20px;margin-left:12px}
  .nav .links a{font-size:14px;color:var(--ink-soft);font-weight:500;cursor:pointer;position:relative;padding:4px 0}
  .nav .links a:hover{color:var(--gold-deep)}
  .nav .links a.on{color:var(--ink)}
  .nav .links a.on::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--gold);border-radius:2px}
  .nav .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .langsw{display:inline-flex;gap:2px;font-size:12.5px;font-weight:600}
  .langsw button{border:0;background:transparent;color:var(--muted);cursor:pointer;padding:4px 5px;font:inherit;border-radius:6px}
  .langsw button.on{color:var(--ink);text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--gold)}
  .langsw span{color:var(--hair-2)}
  .btn{font-family:var(--body);font-weight:600;font-size:14px;border-radius:999px;padding:10px 20px;cursor:pointer;border:1px solid transparent;transition:transform .12s,box-shadow .2s,background .2s;display:inline-flex;align-items:center;gap:8px}
  .btn-gold{background:var(--gold);color:#221803;box-shadow:0 6px 18px -6px rgba(233,166,58,.7)}
  .btn-gold:hover{transform:translateY(-1px);box-shadow:0 10px 24px -6px rgba(233,166,58,.85)}
  .btn-ghost{background:transparent;color:var(--ink);border-color:var(--hair-2)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold-deep)}
  @media(max-width:900px){.nav .links{display:none}}

  .page{display:none}
  .page.active{display:block;animation:fade .5s cubic-bezier(.2,.7,.2,1) both}
  @keyframes fade{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  .hero{position:relative;overflow:hidden;padding:0}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(680px 460px at 16% -6%, color-mix(in srgb,var(--gold) 26%,transparent), transparent 60%);pointer-events:none}
  .hero .wrap{position:relative;display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center;padding-top:clamp(46px,7vw,84px);padding-bottom:clamp(46px,7vw,80px)}
  @media(max-width:900px){.hero .wrap{grid-template-columns:1fr;gap:34px}}
  .hero h1{font-size:clamp(34px,5.4vw,58px);line-height:1.04;font-weight:700;margin:18px 0 0}
  .hero h1 em{font-style:normal;color:var(--gold-deep)}
  :root[data-theme="dark"] .hero h1 em{color:var(--gold)}
  @media (prefers-color-scheme:dark){.hero h1 em{color:var(--gold)}}
  .hero p.sub{font-size:clamp(16px,1.9vw,19px);color:var(--muted);margin:20px 0 0;max-width:52ch}
  .hero .cta{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}
  .hero .trust{margin-top:22px;font-size:13px;color:var(--muted)}

  .phone{justify-self:center;width:min(340px,86vw);background:var(--card);border:1px solid var(--hair);border-radius:30px;box-shadow:0 30px 70px -30px rgba(20,20,30,.45);overflow:hidden}
  .phone .top{background:var(--midnight);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:11px}
  .phone .top .who{line-height:1.25;display:flex;flex-direction:column}
  .phone .top .who .h{font-family:var(--head);font-weight:600;font-size:14.5px}
  .phone .top .who .s{font-size:11.5px;color:#9fb0c6}
  .phone .body{padding:18px 16px 20px;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 7%,var(--card)),var(--card))}
  .bub{max-width:82%;padding:11px 14px;border-radius:16px;font-size:13.5px;line-height:1.5}
  .bub.g{align-self:flex-end;background:var(--gold);color:#241a06;border-bottom-right-radius:5px}
  .bub.a{align-self:flex-start;background:color-mix(in srgb,var(--ink) 6%,var(--card));color:var(--ink);border:1px solid var(--hair);border-bottom-left-radius:5px}
  .bub.a b{color:var(--gold-deep)}
  :root[data-theme="dark"] .bub.a b{color:var(--gold)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
  .chips span{font-size:11.5px;border:1px solid var(--gold);color:var(--gold-deep);border-radius:999px;padding:5px 11px;font-weight:600}
  :root[data-theme="dark"] .chips span{color:var(--gold)}

  section{padding:clamp(50px,8vw,92px) 0}
  .np{padding-top:0}
  .shead{max-width:640px;margin-bottom:clamp(26px,4vw,46px)}
  .shead.center{margin-left:auto;margin-right:auto;text-align:center}
  .shead h2{font-size:clamp(26px,3.6vw,40px);line-height:1.1;font-weight:700;margin-top:12px}
  .shead p{color:var(--muted);font-size:17px;margin:14px 0 0}

  .feat{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:820px){.feat{grid-template-columns:1fr}}
  .feat.four{grid-template-columns:repeat(2,1fr)}
  .fcard{background:var(--card);border:1px solid var(--hair);border-radius:var(--radius);padding:26px}
  .fcard .ic{width:42px;height:42px;border-radius:12px;background:var(--gold-soft);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .fcard .ic svg{width:22px;height:22px;stroke:var(--gold-deep);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  :root[data-theme="dark"] .fcard .ic svg{stroke:var(--gold)}
  .fcard h3{font-size:18px;font-weight:600;margin-bottom:8px}
  .fcard p{color:var(--muted);font-size:14.5px;margin:0}

  .aud{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:820px){.aud{grid-template-columns:1fr}}
  .acard{border-radius:22px;padding:clamp(26px,3vw,38px);border:1px solid var(--hair);position:relative;overflow:hidden}
  .acard.h{background:var(--card)}
  .acard.p{background:var(--midnight);color:#fff;border-color:var(--midnight)}
  .acard .k{font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--gold-deep)}
  .acard.p .k{color:var(--gold)}
  .acard h3{font-size:clamp(22px,2.6vw,28px);margin:12px 0 10px;font-weight:700}
  .acard p.d{color:var(--muted);font-size:15px;margin:0 0 18px}
  .acard.p p.d{color:#a9b6c7}
  .acard ul{list-style:none;padding:0;margin:0 0 22px;display:flex;flex-direction:column;gap:10px}
  .acard li{display:flex;gap:10px;font-size:14.5px;align-items:flex-start}
  .acard li svg{width:18px;height:18px;flex:none;margin-top:2px;stroke:var(--gold-deep);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .acard.p li svg{stroke:var(--gold)}

  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  @media(max-width:820px){.steps{grid-template-columns:1fr}}
  .step{position:relative;padding-top:14px}
  .step .n{font-family:var(--head);font-size:14px;font-weight:700;color:var(--gold-deep);letter-spacing:.1em}
  :root[data-theme="dark"] .step .n{color:var(--gold)}
  .step h3{font-size:18px;margin:10px 0 8px;font-weight:600}
  .step p{color:var(--muted);font-size:14.5px;margin:0}
  .step::before{content:"";position:absolute;top:0;left:0;width:34px;height:3px;border-radius:3px;background:var(--gold)}

  .stats{background:var(--midnight);color:#fff;border-radius:26px;padding:clamp(30px,4vw,46px);display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
  @media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat .v{font-family:var(--head);font-size:clamp(28px,4vw,40px);font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}
  .stat .l{font-size:13.5px;color:#a9b6c7;margin-top:4px}

  .ctaband{text-align:center;background:radial-gradient(500px 300px at 50% 0%, color-mix(in srgb,var(--gold) 20%,transparent), transparent 70%),var(--card);border:1px solid var(--hair);border-radius:26px;padding:clamp(40px,6vw,66px) 24px}
  .ctaband h2{font-size:clamp(26px,3.6vw,40px);font-weight:700;max-width:22ch;margin:0 auto}
  .ctaband p{color:var(--muted);margin:16px auto 28px;max-width:48ch}

  .pagehero{position:relative;overflow:hidden;padding:0}
  .pagehero::before{content:"";position:absolute;inset:0;background:radial-gradient(560px 360px at 82% -10%, color-mix(in srgb,var(--gold) 22%,transparent), transparent 60%);pointer-events:none}
  .pagehero .wrap{position:relative;padding:clamp(44px,6vw,76px) 0 clamp(10px,3vw,22px);max-width:820px}
  .pagehero h1{font-size:clamp(32px,5vw,50px);line-height:1.05;font-weight:700;margin:16px 0 0}
  .pagehero p{font-size:clamp(16px,1.9vw,19px);color:var(--muted);margin:18px 0 0;max-width:56ch}
  .pagehero .cta{margin-top:26px;display:flex;gap:12px;flex-wrap:wrap}

  footer{margin-top:clamp(40px,6vw,80px);border-top:1px solid var(--hair);background:var(--paper)}
  .foot{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:34px;padding:clamp(40px,5vw,60px) 0 26px}
  @media(max-width:760px){.foot{grid-template-columns:1fr;gap:26px}}
  .foot .col h4{font-family:var(--head);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 14px;font-weight:700}
  .foot .col a,.foot .col p{display:block;font-size:14px;color:var(--ink-soft);margin:0 0 9px}
  .foot .col a{cursor:pointer}
  .foot .col a:hover{color:var(--gold-deep)}
  .foot .about{color:var(--muted);font-size:14px;max-width:34ch;margin:14px 0 0}
  .legal{border-top:1px solid var(--hair);padding:18px 0;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--muted)}

  .printband{display:grid;grid-template-columns:1.35fr .9fr;gap:30px;align-items:center;background:var(--card);border:1px solid var(--hair);border-radius:22px;padding:clamp(26px,4vw,44px)}
  @media(max-width:760px){.printband{grid-template-columns:1fr}}
  .printband h2{font-size:clamp(22px,3vw,32px);font-weight:700;margin:12px 0 12px}
  .printband p{color:var(--muted);font-size:15.5px;margin:0;max-width:54ch}
  .printband .art{display:flex;justify-content:center}
  .booktile{width:clamp(110px,16vw,150px);aspect-ratio:1;border-radius:28px;background:var(--gold-soft);display:flex;align-items:center;justify-content:center}
  .booktile svg{width:52%;height:52%;stroke:var(--gold-deep);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  :root[data-theme="dark"] .booktile svg{stroke:var(--gold)}

  /* interactive motion */
  header{transition:box-shadow .3s ease,background .3s ease}
  header.scrolled{box-shadow:0 8px 28px -18px rgba(20,20,30,.55)}
  .fcard,.acard{transition:transform .24s cubic-bezier(.2,.7,.2,1),box-shadow .24s ease,border-color .24s ease}
  .fcard:hover{transform:translateY(-4px);box-shadow:0 20px 38px -22px rgba(20,20,30,.4);border-color:var(--gold)}
  .acard.h:hover{transform:translateY(-4px);box-shadow:0 20px 38px -22px rgba(20,20,30,.35)}
  .acard.p:hover{transform:translateY(-4px)}
  .step{transition:transform .24s cubic-bezier(.2,.7,.2,1)}
  .step:hover{transform:translateY(-3px)}
  .btn{will-change:transform}
  .r{opacity:0;transform:translateY(26px);transition:opacity .65s cubic-bezier(.2,.7,.2,1),transform .65s cubic-bezier(.2,.7,.2,1)}
  .r.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){.r{opacity:1 !important;transform:none !important;transition:none}.page.active{animation:none}}

  canvas.mk{display:block}
  @media (prefers-reduced-motion:no-preference){
    .reveal{opacity:0;transform:translateY(14px);animation:rv .7s cubic-bezier(.2,.7,.2,1) forwards}
    @keyframes rv{to{opacity:1;transform:none}}
    .d1{animation-delay:.05s}.d2{animation-delay:.13s}.d3{animation-delay:.22s}.d4{animation-delay:.3s}
  }
</style>
</head>
<body>


<header>
  <div class="wrap nav">
    <div class="brand" data-route="home">
      <canvas class="mk" data-mk data-size="34" data-tone="gold"></canvas>
      <span class="wm"><span class="t">DISTRIBUTION</span><span class="m">Coeur-Soleil</span></span>
    </div>
    <nav class="links">
      <a data-route="home" data-i18n="nav.concierge"></a>
      <a data-route="hotels" data-i18n="nav.hotels"></a>
      <a data-route="partenaires" data-i18n="nav.partners"></a>
      <a data-route="home#etapes" data-i18n="nav.how"></a>
    </nav>
    <div class="right">
      <div class="langsw" id="langsw">
        <button data-lang="fr">FR</button><span>·</span><button data-lang="en">EN</button><span>·</span><button data-lang="es">ES</button>
      </div>
      <a class="btn btn-gold" href="mailto:hotel@distributioncoeursoleil.ca" data-i18n="cta.demo"></a>
    </div>
  </div>
</header>

<main>
  <!-- ============ HOME ============ -->
  <div class="page" data-page="home">
    <section class="hero">
      <div class="wrap">
        <div class="htext">
          <p class="eyebrow reveal d1" data-i18n="hero.badge"></p>
          <h1 class="reveal d2" data-i18n-html="hero.title"></h1>
          <p class="sub reveal d3" data-i18n="hero.sub"></p>
          <div class="cta reveal d3">
            <a class="btn btn-gold" href="mailto:hotel@distributioncoeursoleil.ca" data-i18n="cta.demo"></a>
            <a class="btn btn-ghost" data-route="home#alfred" data-i18n="hero.cta2"></a>
          </div>
          <p class="trust reveal d4" data-i18n="hero.trust"></p>
        </div>
        <div class="phone reveal d4">
          <div class="top">
            <canvas class="mk" data-mk data-size="30" data-tone="golddark"></canvas>
            <span class="who"><span class="h">Alfred</span><span class="s" data-i18n="chat.role"></span></span>
          </div>
          <div class="body">
            <div class="bub g" data-i18n="chat.q1"></div>
            <div class="bub a" data-i18n-html="chat.a1"></div>
            <div class="chips"><span data-i18n="chat.c1"></span><span data-i18n="chat.c2"></span><span data-i18n="chat.c3"></span></div>
            <div class="bub g" data-i18n="chat.q2"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="alfred">
      <div class="wrap">
        <div class="shead">
          <p class="eyebrow" data-i18n="sec1.eyebrow"></p>
          <h2 data-i18n="sec1.title"></h2>
          <p data-i18n="sec1.sub"></p>
        </div>
        <div class="feat">
          <div class="fcard"><div class="ic"><svg viewBox="0 0 24 24"><path d="M12 3l2.5 5 5.5.8-4 3.9.9 5.5L12 21l-4.9-2.8.9-5.5-4-3.9 5.5-.8z"/></svg></div><h3 data-i18n="f1.t"></h3><p data-i18n="f1.p"></p></div>
          <div class="fcard"><div class="ic"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><h3 data-i18n="f2.t"></h3><p data-i18n="f2.p"></p></div>
          <div class="fcard"><div class="ic"><svg viewBox="0 0 24 24"><path d="M3 3v18h18M7 15l4-4 3 3 5-6"/></svg></div><h3 data-i18n="f3.t"></h3><p data-i18n="f3.p"></p></div>
        </div>
      </div>
    </section>

    <section class="np">
      <div class="wrap">
        <div class="aud">
          <div class="acard h">
            <span class="k" data-i18n="hotels.k"></span>
            <h3 data-i18n="hotels.title"></h3>
            <p class="d" data-i18n="hotels.sub"></p>
            <ul>
              <li><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="hotels.li1"></span></li>
              <li><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="hotels.li2"></span></li>
              <li><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="hotels.li3"></span></li>
            </ul>
            <a class="btn btn-ghost" data-route="hotels" data-i18n="hotels.btn"></a>
          </div>
          <div class="acard p">
            <span class="k" data-i18n="partners.k"></span>
            <h3 data-i18n="partners.title"></h3>
            <p class="d" data-i18n="partners.sub"></p>
            <ul>
              <li><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="partners.li1"></span></li>
              <li><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="partners.li2"></span></li>
              <li><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="partners.li3"></span></li>
            </ul>
            <a class="btn btn-gold" data-route="partenaires" data-i18n="partners.btn"></a>
          </div>
        </div>
      </div>
    </section>

    <section id="etapes" class="np">
      <div class="wrap">
        <div class="shead"><p class="eyebrow" data-i18n="steps.eyebrow"></p><h2 data-i18n="steps.title"></h2></div>
        <div class="steps">
          <div class="step"><div class="n" data-i18n="steps.n1"></div><h3 data-i18n="s1.t"></h3><p data-i18n="s1.p"></p></div>
          <div class="step"><div class="n" data-i18n="steps.n2"></div><h3 data-i18n="s2.t"></h3><p data-i18n="s2.p"></p></div>
          <div class="step"><div class="n" data-i18n="steps.n3"></div><h3 data-i18n="s3.t"></h3><p data-i18n="s3.p"></p></div>
        </div>
      </div>
    </section>

var lang="fr";

  document.querySelectorAll("[data-i18n-html]").forEach(function(el){var v=d[el.getAttribute("data-i18n-html")];if(v!=null)el.innerHTML=v;});

}

/* ---------- routing ---------- */
function go(route){
  var hash=(route||location.hash.replace(/^#/,"")||"home");
  var parts=hash.split("#"); var page=parts[0]||"home"; var anchor=parts[1];
  if(!document.querySelector('[data-page="'+page+'"]'))page="home";
  document.querySelectorAll(".page").forEach(function(p){p.classList.toggle("active",p.dataset.page===page);});
  document.querySelectorAll('.nav .links a[data-route]').forEach(function(a){
    var r=(a.dataset.route||"").split("#")[0];a.classList.toggle("on",r===page);});
  var _ap=document.querySelector('.page.active'); if(typeof setupReveal==="function"&&_ap)setupReveal(_ap);
  if(anchor){var t=document.getElementById(anchor);if(t){setTimeout(function(){t.scrollIntoView({behavior:"smooth"});},60);}}
  else window.scrollTo({top:0,behavior:"instant"in window?"instant":"auto"});
}
document.querySelectorAll("[data-route]").forEach(function(el){el.addEventListener("click",function(e){e.preventDefault();var r=el.getAttribute("data-route");history.replaceState(null,"","#"+r);go(r);});});
window.addEventListener("hashchange",function(){go();});

/* ---------- scroll reveal + header ---------- */
var REDUCE=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
var _io=(!REDUCE&&"IntersectionObserver"in window)?new IntersectionObserver(function(es){
  es.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");_io.unobserve(e.target);}});
},{threshold:0.12,rootMargin:"0px 0px -6% 0px"}):null;
function setupReveal(page){
  if(REDUCE||!_io)return;
  var counts=new WeakMap();
  page.querySelectorAll(".shead,.fcard,.acard,.step,.stats,.ctaband,.printband").forEach(function(el){
    if(el.closest(".hero")||el.closest(".pagehero"))return;
    if(!el.classList.contains("r")){
      el.classList.add("r");
      var p=el.parentElement, n=counts.get(p)||0; counts.set(p,n+1);
      el.style.transitionDelay=Math.min(n,5)*70+"ms";

    el.classList.remove("in"); _io.observe(el);
  });
}
